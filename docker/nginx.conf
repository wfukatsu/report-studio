server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy the API to the backend service (same origin from the browser's
    # point of view). The backend's CSRF check compares the Origin header against
    # ALLOWED_ORIGIN, so keep ALLOWED_ORIGIN in docker-compose.yml aligned with the
    # URL you open in the browser.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # PDF export / large templates can take a while
        proxy_read_timeout 120s;
    }

    # SPA fallback — every non-file route resolves to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
