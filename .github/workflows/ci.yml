name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege: every job only reads repo contents (#272).
permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (lint / build / test)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check + build
        run: npm run build

      - name: Type-check (tsc — TS7 native)
        # TS7 native is now the primary compiler (#252); this checks both
        # tsconfigs explicitly (build's `tsc -b` covers them via references,
        # this keeps the per-project check visible and cheap) (#272).
        run: npm run typecheck:native

      - name: Audit production dependencies
        # High-severity advisories in runtime deps fail CI; dev-only and
        # low/moderate advisories are Dependabot's job, not a merge gate (#272).
        run: npm audit --omit=dev --audit-level=high

      - name: Test (+ coverage ratchet)
        # --coverage enforces the ratchet thresholds in vitest.config.ts, so a
        # coverage regression fails CI instead of only being caught by whoever
        # runs test:coverage locally (#220).
        # vitest 3 (pool rewrite) — vitest 2.1.9 workers deadlocked
        # intermittently on this runner regardless of pool (forks and threads),
        # always right before ResponsesPanel.test.tsx started. The default
        # reporter keeps per-file progress visible; the step timeout is the
        # safety net. (Vitest 4 removed the old `basic` reporter — `default`
        # is its per-file-progress successor.)
        # Coverage instrumentation slows jsdom+RTL ~4x, so allow more headroom.
        timeout-minutes: 20
        run: npx vitest run --coverage --reporter=default

      - name: Storybook build
        # Catches preview-config / addon-compat breakage that the unit suite
        # never exercises — stories otherwise rot silently (#226).
        run: npm run build-storybook

  backend:
    name: Backend (JUnit + golden PDF regression)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Prepare ScalarDB config
        run: cp server/scalardb.properties.example server/scalardb.properties

      - name: Spotless (google-java-format AOSP) check
        # Format gate wired into `check`; run explicitly so a formatting drift
        # fails fast before the (slower) test task (#226). Fix locally with
        # `./gradlew spotlessApply`.
        working-directory: server
        run: ./gradlew spotlessCheck

      - name: Test (+ coverage ratchet)
        # jacocoTestCoverageVerification enforces the ratchet thresholds in
        # build.gradle.kts (#266), so a backend coverage regression fails CI.
        working-directory: server
        run: ./gradlew test jacocoTestCoverageVerification

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: backend-test-report
          path: server/build/reports/tests/test/
          retention-days: 7

  e2e:
    name: E2E (Playwright smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      # Backend runs as a Playwright webServer (dev:backend → gradlew run).
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Prepare ScalarDB config
        run: cp server/scalardb.properties.example server/scalardb.properties

      - name: Run E2E smoke
        # playwright.config.ts boots the backend (:8080) + Vite (:5173) itself.
        # Fresh backend seeds admin/changeme, which the smoke logs in with.
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
