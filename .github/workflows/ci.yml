name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend (lint / build / test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check + build
        run: npm run build

      # DEBUG (temporary): the suspect file hangs BEFORE collection output.
      # Matrix of probes to localize the hang (each tolerates failure).
      - name: Probe 1 — collection only (vitest list)
        timeout-minutes: 4
        continue-on-error: true
        run: npx vitest list src/components/sidebar/ResponsesPanel.test.tsx

      - name: Probe 2 — threads pool instead of forks
        timeout-minutes: 4
        continue-on-error: true
        run: npx vitest run src/components/sidebar/ResponsesPanel.test.tsx --reporter=basic --pool=threads

      - name: Probe 3 — sibling store test (shares most of the import graph)
        timeout-minutes: 4
        continue-on-error: true
        run: npx vitest run src/store/responsesSlice.test.ts --reporter=basic

      - name: Probe 4 — suspect file, forks (baseline repro)
        timeout-minutes: 4
        run: npx vitest run src/components/sidebar/ResponsesPanel.test.tsx --reporter=basic
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  backend:
    name: Backend (JUnit + golden PDF regression)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Prepare ScalarDB config
        run: cp server/scalardb.properties.example server/scalardb.properties

      - name: Test
        working-directory: server
        run: ./gradlew test

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: server/build/reports/tests/test/
          retention-days: 7
