name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend (lint / build / test)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check + build
        run: npm run build

      - name: Test (+ coverage ratchet)
        # --coverage enforces the ratchet thresholds in vitest.config.ts, so a
        # coverage regression fails CI instead of only being caught by whoever
        # runs test:coverage locally (#220).
        # vitest 3 (pool rewrite) — vitest 2.1.9 workers deadlocked
        # intermittently on this runner regardless of pool (forks and threads),
        # always right before ResponsesPanel.test.tsx started. The default
        # reporter keeps per-file progress visible; the step timeout is the
        # safety net. (Vitest 4 removed the old `basic` reporter — `default`
        # is its per-file-progress successor.)
        # Coverage instrumentation slows jsdom+RTL ~4x, so allow more headroom.
        timeout-minutes: 20
        run: npx vitest run --coverage --reporter=default

      - name: Storybook build
        # Catches preview-config / addon-compat breakage that the unit suite
        # never exercises — stories otherwise rot silently (#226).
        run: npm run build-storybook

  backend:
    name: Backend (JUnit + golden PDF regression)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Prepare ScalarDB config
        run: cp server/scalardb.properties.example server/scalardb.properties

      - name: Spotless (google-java-format AOSP) check
        # Format gate wired into `check`; run explicitly so a formatting drift
        # fails fast before the (slower) test task (#226). Fix locally with
        # `./gradlew spotlessApply`.
        working-directory: server
        run: ./gradlew spotlessCheck

      - name: Test
        working-directory: server
        run: ./gradlew test

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-report
          path: server/build/reports/tests/test/
          retention-days: 7

  e2e:
    name: E2E (Playwright smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Backend runs as a Playwright webServer (dev:backend → gradlew run).
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Prepare ScalarDB config
        run: cp server/scalardb.properties.example server/scalardb.properties

      - name: Run E2E smoke
        # playwright.config.ts boots the backend (:8080) + Vite (:5173) itself.
        # Fresh backend seeds admin/changeme, which the smoke logs in with.
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
